name: Build iOS App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 15
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project FileSalvage.xcodeproj \
            -scheme FileSalvage \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.5' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build \
            2>&1 | tee build.log
          if grep -q "BUILD SUCCEEDED" build.log; then
            echo "✅ Build succeeded!"
          else
            echo "❌ Build failed."
            exit 1
          fi

      - name: Archive .app
        if: success()
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "FileSalvage.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP_PATH" ]; then
            mkdir -p artifacts
            cp -r "$APP_PATH" artifacts/
            cd artifacts && zip -r ../FileSalvage-Simulator.zip FileSalvage.app
          fi

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: FileSalvage-Simulator-Build
          path: FileSalvage-Simulator.zip
          retention-days: 14

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
